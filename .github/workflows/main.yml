name: Build DR-120R APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system deps
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          build-essential libssl-dev libffi-dev \
          libltdl-dev autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev

    - name: Install buildozer & kivy
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==3.0.11 kivy==2.3.0

    - name: Cache Android SDK
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.android
        key: android-sdk-${{ hashFiles('dr120r_kivy/app/buildozer.spec') }}
        restore-keys: android-sdk-

    - name: Build APK
      working-directory: dr120r_kivy/app
      run: |
        buildozer android debug 2>&1 | tail -80
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    # ── Debug: หา APK ทุก path ──
    - name: Find APK
      if: always()
      run: |
        echo "=== ค้นหา APK ทั่วทั้ง repo ==="
        find . -name "*.apk" 2>/dev/null && echo "---" || echo "ไม่พบ .apk เลย"
        echo "=== bin/ folder ==="
        ls -lh dr120r_kivy/app/bin/ 2>/dev/null || echo "ไม่มี bin/ folder"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DR-120R-APK
        path: |
          dr120r_kivy/app/bin/*.apk
        if-no-files-found: error
        retention-days: 90
